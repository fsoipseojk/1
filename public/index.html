<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .my-ip-section {
            text-align: center;
        }

        .my-ip-section h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .ip-display {
            background: #f0f0f0;
            padding: 20px;
            border-radius: 8px;
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
            font-family: 'Courier New', monospace;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-box .number {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-box .label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .visitors-section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.3em;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table thead {
            background: #f5f5f5;
        }

        table th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #ddd;
        }

        table td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            color: #666;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        table tr:hover {
            background: #f9f9f9;
        }

        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            margin-top: 20px;
            transition: background 0.3s;
        }

        .refresh-btn:hover {
            background: #764ba2;
        }

        .no-data {
            text-align: center;
            color: #999;
            padding: 20px;
        }

        @media (max-width: 600px) {
            .stats {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8em;
            }

            table {
                font-size: 0.85em;
            }

            table th, table td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌐 IP Tracker</h1>
            <p>Tracking visitor IP addresses in real-time</p>
        </div>

        <div class="card my-ip-section">
            <h2>Your IP Address</h2>
            <div class="ip-display" id="myIp">Loading...</div>
        </div>

        <div class="card">
            <div class="stats">
                <div class="stat-box">
                    <div class="number" id="totalVisitors">0</div>
                    <div class="label">Total Unique Visitors</div>
                </div>
                <div class="stat-box">
                    <div class="number" id="totalVisits">0</div>
                    <div class="label">Total Visits</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="visitors-section">
                <h2>Visitor Log</h2>
                <table id="visitorsTable">
                    <thead>
                        <tr>
                            <th>IP Address</th>
                            <th>Visits</th>
                            <th>First Visit</th>
                            <th>Last Visit</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr>
                            <td colspan="4" class="no-data">Loading visitor data...</td>
                        </tr>
                    </tbody>
                </table>
                <button class="refresh-btn" onclick="loadVisitors()">🔄 Refresh</button>
            </div>
        </div>
    </div>

    <script>
        // Load my IP
        async function loadMyIP() {
            try {
                const response = await fetch('/api/my-ip');
                const data = await response.json();
                document.getElementById('myIp').textContent = data.ip;
            } catch (error) {
                console.error('Error loading IP:', error);
                document.getElementById('myIp').textContent = 'Error loading IP';
            }
        }

        // Load visitors data
        async function loadVisitors() {
            try {
                const response = await fetch('/api/visitors');
                const data = await response.json();
                
                document.getElementById('totalVisitors').textContent = data.totalVisitors;
                document.getElementById('totalVisits').textContent = data.totalVisits;

                const tableBody = document.getElementById('tableBody');
                
                if (data.visitors.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="4" class="no-data">No visitors yet</td></tr>';
                } else {
                    tableBody.innerHTML = data.visitors.map(visitor => `
                        <tr>
                            <td>${visitor.ip}</td>
                            <td>${visitor.visits}</td>
                            <td>${new Date(visitor.firstVisit).toLocaleString()}</td>
                            <td>${new Date(visitor.lastVisit).toLocaleString()}</td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading visitors:', error);
                document.getElementById('tableBody').innerHTML = 
                    '<tr><td colspan="4" class="no-data">Error loading visitor data</td></tr>';
            }
        }

        // Initial load
        loadMyIP();
        loadVisitors();

        // Auto-refresh every 5 seconds
        setInterval(loadVisitors, 5000);
    </script>
</body>
</html>
